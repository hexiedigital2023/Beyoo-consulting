<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/tokens/fonts.css">
<link rel="stylesheet" href="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/tokens/colors.css">
<link rel="stylesheet" href="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/tokens/typography.css">
<link rel="stylesheet" href="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/tokens/spacing.css">
<link rel="stylesheet" href="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/tokens/effects.css">
<link rel="stylesheet" href="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/tokens/base.css">
<link rel="stylesheet" href="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/styles.css">
<script src="_ds/hexie-digital-design-system-2fbbeb11-3b86-40a3-b4a1-727af714a037/_ds_bundle.js"></script>
</helmet>
<header style="position:sticky; top:0; z-index:50; background:rgba(244,243,239,.82); backdrop-filter:blur(10px); border-bottom:1px solid var(--border-subtle);">
  <div style="max-width:var(--container-max); margin:0 auto; padding:18px 40px; display:flex; align-items:center; justify-content:space-between; gap:24px;">
    <a href="MarketBriefing.dc.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <span style="width:22px; height:6px; background:var(--gold-500); border-radius:2px; flex-shrink:0;"></span>
      <span style="font-family:var(--font-display); font-weight:600; font-size:19px; letter-spacing:-.02em; color:var(--text-primary); white-space:nowrap;">BEYOO<span style="color:var(--text-secondary); font-weight:400;"> Consulting</span></span>
    </a>
    <nav style="display:flex; align-items:center; gap:32px;">
      <a href="MarketBriefing.dc.html" style="font-family:var(--font-display); font-size:15px; text-decoration:none; padding:4px 0; font-weight:{{ homeWeight }}; color:{{ homeColor }}; border-bottom:{{ homeBorder }};">Home</a>
      <a href="Services.dc.html" style="font-family:var(--font-display); font-size:15px; text-decoration:none; padding:4px 0; font-weight:{{ servicesWeight }}; color:{{ servicesColor }}; border-bottom:{{ servicesBorder }};">What we do</a>
      <a href="CaseStudies.dc.html" style="font-family:var(--font-display); font-size:15px; text-decoration:none; padding:4px 0; font-weight:{{ casesWeight }}; color:{{ casesColor }}; border-bottom:{{ casesBorder }};">Case studies</a>
      <a href="Team.dc.html" style="font-family:var(--font-display); font-size:15px; text-decoration:none; padding:4px 0; font-weight:{{ teamWeight }}; color:{{ teamColor }}; border-bottom:{{ teamBorder }};">Team</a>
      <a href="Contact.dc.html" style="font-family:var(--font-display); font-size:15px; text-decoration:none; padding:4px 0; font-weight:{{ contactWeight }}; color:{{ contactColor }}; border-bottom:{{ contactBorder }};">Contact</a>
      <a href="Contact.dc.html" style="text-decoration:none;"><x-import component-from-global-scope="HexieDigitalDesignSystem_2fbbeb.Button" size="sm" hint-size="auto,36px">Book a consultation</x-import></a>
    </nav>
  </div>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;current&quot;: {&quot;editor&quot;: null, &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const current = this.props.current || 'home';
    const styleFor = (id) => ({
      weight: current === id ? 600 : 500,
      color: current === id ? 'var(--text-primary)' : 'var(--text-secondary)',
      border: current === id ? '1.5px solid var(--ink-900)' : '1.5px solid transparent',
    });
    const home = styleFor('home');
    const services = styleFor('services');
    const cases = styleFor('cases');
    const team = styleFor('team');
    const contact = styleFor('contact');
    return {
      homeWeight: home.weight, homeColor: home.color, homeBorder: home.border,
      servicesWeight: services.weight, servicesColor: services.color, servicesBorder: services.border,
      casesWeight: cases.weight, casesColor: cases.color, casesBorder: cases.border,
      teamWeight: team.weight, teamColor: team.color, teamBorder: team.border,
      contactWeight: contact.weight, contactColor: contact.color, contactBorder: contact.border,
    };
  }
}

</script>
</body>
</html>
